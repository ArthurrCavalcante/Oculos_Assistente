# =============================================================================
# gradle-wrapper.properties — Configuração do Gradle Wrapper
# =============================================================================
# O Gradle Wrapper garante que todos os desenvolvedores e o CI usem
# exatamente a mesma versão do Gradle, sem instalação manual.
#
# Versão do Gradle: 8.2 (compatível com o AGP 8.2.0)
# =============================================================================

distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
